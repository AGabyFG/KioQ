<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calificador de Clientes — c-Agent | KIO × Derevo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #C0197E;
    --pink-dark: #9B1465;
    --pink-light: #FFF0F8;
    --pink-text: #7D0050;
    --purple: #534AB7;
    --purple-dark: #3C3489;
    --purple-light: #EEEDFE;
    --purple-border: #AFA9EC;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-border: #5DCAA5;
    --teal-dark: #085041;
    --teal-text: #0F6E56;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --blue: #378ADD;
    --green: #639922;
    --green-light: #EAF3DE;
    --green-dark: #3B6D11;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --orange: #EF9F27;
    --gray-bg: #F5F5F3;
    --gray-card: #ffffff;
    --gray-border: rgba(0,0,0,0.12);
    --gray-border-md: rgba(0,0,0,0.22);
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --radius-sm: 8px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .page-wrap {
    max-width: 680px;
    margin: 0 auto;
  }
  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .logo-pill {
    background: var(--pink);
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 99px;
    letter-spacing: 0.03em;
  }
  .header-title {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 400;
  }
  /* Card */
  .card {
    background: var(--gray-card);
    border: 0.5px solid var(--gray-border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  /* Progress */
  .pbar-bg {
    background: #e8e8e6;
    border-radius: 99px;
    height: 5px;
    margin-bottom: 1.75rem;
  }
  .pbar-fill {
    height: 5px;
    border-radius: 99px;
    background: var(--pink);
    transition: width 0.35s ease;
  }
  .sect-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 5px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .q-hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-bottom: 1.25rem;
    line-height: 1.5;
    font-style: italic;
  }
  /* Options */
  .opts { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    background: #fff;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--text-primary);
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    line-height: 1.45;
    transition: border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .opt:hover { border-color: var(--gray-border-md); background: #fafafa; }
  .opt.sel { border: 1.5px solid var(--pink); background: var(--pink-light); color: var(--pink-text); }
  .radio {
    width: 17px; height: 17px; min-width: 17px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .opt.sel .radio { border-color: var(--pink); background: var(--pink); }
  .opt.sel .radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; display: block; }
  /* Nav */
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btn-primary {
    background: var(--pink); color: white; border: none;
    border-radius: var(--radius-sm); padding: 10px 22px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--pink-dark); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--gray-border);
    border-radius: var(--radius-sm); padding: 10px 18px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-ghost:hover { background: #f5f5f3; }
  .step-n { font-size: 12px; color: var(--text-tertiary); }
  /* Result */
  .ring-wrap { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  .tier-badge {
    display: inline-block; padding: 4px 14px; border-radius: 99px;
    font-size: 11px; font-weight: 600; margin-bottom: 8px;
  }
  .tier-green { background: var(--green-light); color: var(--green-dark); }
  .tier-amber { background: var(--amber-light); color: var(--amber); }
  .tier-red { background: var(--red-light); color: var(--red-dark); }
  .tier-purple { background: var(--purple-light); color: var(--purple-dark); }
  .r-title { font-size: 19px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .r-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 1.25rem; }
  .divider { border: none; border-top: 0.5px solid var(--gray-border); margin: 1.1rem 0; }
  .section-title {
    font-size: 10px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  /* Summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px; margin-bottom: 1.25rem; }
  .sum-card { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 10px 12px; }
  .sum-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sum-val { font-size: 12px; font-weight: 600; color: var(--text-primary); line-height: 1.35; }
  /* Breakdown */
  .brow { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
  .blabel { font-size: 12px; color: var(--text-secondary); min-width: 130px; }
  .bbg { flex: 1; background: #e8e8e6; border-radius: 99px; height: 5px; }
  .bfill { height: 5px; border-radius: 99px; }
  .bval { font-size: 11px; color: var(--text-tertiary); min-width: 30px; text-align: right; }
  /* Proposal boxes */
  .pkg-box { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 13px 15px; }
  .pkg-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .pkg-val { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
  .pkg-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  .combo-box {
    background: var(--purple-light); border: 0.5px solid var(--purple-border);
    border-radius: var(--radius-sm); padding: 13px 15px; margin-top: 9px;
  }
  .combo-title { font-size: 12px; font-weight: 600; color: var(--purple-dark); margin-bottom: 5px; }
  .combo-body { font-size: 12px; color: var(--purple); line-height: 1.55; }
  .ato-box {
    background: var(--teal-light); border: 0.5px solid var(--teal-border);
    border-radius: var(--radius-sm); padding: 13px 15px; margin-top: 9px;
  }
  .ato-title { font-size: 12px; font-weight: 600; color: var(--teal-dark); margin-bottom: 5px; }
  .ato-body { font-size: 12px; color: var(--teal-text); line-height: 1.55; }
  /* Rec items */
  .rec-item {
    border: 0.5px solid var(--gray-border); border-radius: var(--radius-sm);
    padding: 13px 15px; margin-bottom: 9px;
  }
  .rec-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 6px; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; min-width: 8px; margin-top: 4px; flex-shrink: 0; }
  .rec-dot.purple { background: var(--purple); }
  .rec-dot.red { background: var(--red); }
  .rec-dot.amber { background: var(--orange); }
  .rec-dot.green { background: var(--green); }
  .rec-label { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
  .rec-action {
    font-size: 12px; color: var(--text-secondary); line-height: 1.55;
    padding-left: 17px; border-left: 2px solid #e0e0de; margin-left: 4px;
  }
  .restart-wrap { display: flex; justify-content: center; margin-top: 1.5rem; }
  .contact-box {
    background: #EEEDFE; border: 0.5px solid #AFA9EC;
    border-radius: var(--radius-md); padding: 16px 18px; margin-top: 1.1rem;
  }
  .contact-label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .contact-name { font-size: 15px; font-weight: 600; color: #3C3489; margin-bottom: 3px; }
  .contact-email { font-size: 13px; color: #534AB7; }
  .contact-email a { color: #534AB7; text-decoration: none; border-bottom: 1px solid #AFA9EC; }
  .contact-email a:hover { color: #3C3489; }
  .btn-mailto {
    background: #534AB7; color: white; border: none;
    border-radius: var(--radius-sm); padding: 9px 18px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; margin-top: 10px; display: inline-block;
    text-decoration: none;
  }
  .btn-mailto:hover { background: #3C3489; }
  /* Footer */
  .footer { text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 1.5rem; }
  .btn-pdf {
    background: #1a1a1a; color: white; border: none;
    border-radius: var(--radius-sm); padding: 10px 22px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 0.15s;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-pdf:hover { background: #333; }
  .pdf-bar {
    display: flex; justify-content: center; gap: 10px;
    margin-top: 1.5rem; flex-wrap: wrap;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <span class="logo-pill">c-Agent</span>
    <span class="header-title">Calificador de clientes — KIO IT Services × Derevo</span>
  </div>

  <div class="card" id="quiz-view">
    <div class="pbar-bg"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>

<script>
const Q=[
  {s:"Perfil de la empresa",q:"¿Cuál es el tamaño de la empresa del cliente?",hint:"C-Agent va dirigido a empresas Corporate y Top SMB. Esto ayuda a determinar si el cliente es el mercado objetivo.",w:"size",opts:[

    {l:"Top SMB — empresa mediana en la parte alta del segmento, con operación establecida (100–500 empleados o facturación $10M–$50M USD/año)",sc:4,tag:"topsmb"},

  {s:"Perfil de la empresa",q:"¿En qué industria o giro opera principalmente la empresa del cliente?",hint:"C-Agent tiene casos de éxito documentados y especializaciones pre-configuradas en estas verticales.",w:"industry",opts:[
    {l:"Manufactura, Logística o Supply Chain",sc:5,tag:"mfg"},
    {l:"Retail, Farmacia o Consumo masivo",sc:5,tag:"retail"},
    {l:"Servicios financieros, Seguros o Fintech",sc:4,tag:"finance"},
    {l:"Salud, Pharma o Ciencias de la vida",sc:4,tag:"health"},

    {l:"Educación, Servicios profesionales u Otra industria",sc:3,tag:"other"}

  {s:"Sponsor y proceso de decisión",q:"¿Quién es el sponsor o promotor interno del proyecto en la organización del cliente?",hint:"Los sponsors clave de c-Agent son directores de área de negocio (Ventas, Finanzas, Mercadeo). La venta es más ágil cuando el sponsor tiene autoridad directa.",w:"sponsor",opts:[
    {l:"CEO, Dueño o Director General — con autoridad de compra directa",sc:5,tag:"ceo"},

    {l:"Director de TI (CIO/CTO) o Director de Datos / Analytics",sc:4,tag:"it_dir"},

let cur=0,ans=new Array(Q.length).fill(null);

function render(){
  const q=Q[cur];
  document.getElementById("pbar").style.width=Math.round(cur/Q.length*100)+"%";
  document.getElementById("sect").textContent=q.s;
  document.getElementById("qtxt").textContent=q.q;
  document.getElementById("qhint").textContent=q.hint;
  document.getElementById("stepN").textContent="Pregunta "+(cur+1)+" de "+Q.length;
  document.getElementById("btnBack").style.visibility=cur===0?"hidden":"visible";
  document.getElementById("btnNext").textContent=cur===Q.length-1?"Ver resultado →":"Siguiente →";
  const ol=document.getElementById("opts");ol.innerHTML="";
  q.opts.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt"+(ans[cur]===i?" sel":"");
    b.innerHTML='<span class="radio"></span><span>'+o.l+"</span>";
    b.onclick=()=>{ans[cur]=i;render();};
    ol.appendChild(b);
  });
  document.getElementById("btnNext").disabled=ans[cur]===null;
}

function goBack(){if(cur>0){cur--;render();}}
function goNext(){if(ans[cur]===null)return;if(cur<Q.length-1){cur++;render();}else showResult();}

function showResult(){
  const groups={};
  Q.forEach((q,i)=>{
    const g=CAT_GROUP[q.w];
    if(!groups[g]){groups[g]={s:0,m:0,color:CAT_COLOR[q.w]};}
    groups[g].s+=Q[i].opts[ans[i]].sc;
    groups[g].m+=5;
  });
  let total=0,maxT=0;
  Object.values(groups).forEach(d=>{total+=d.s;maxT+=d.m;});
  const pct=Math.round((total/maxT)*100);

  const flags=[];
  let needsDIaaS=false,needsATO=false;
  Q.forEach((q,i)=>{
    const opt=q.opts[ans[i]];
    const key=q.w+"_"+opt.tag;
    if(FLAGS[key]){
      flags.push({...FLAGS[key],key});
      if(["goldlayer_raw","goldlayer_none","goldlayer_tbd"].includes(key)) needsDIaaS=true;
      if(["clarity_exploring","clarity_none"].includes(key)) needsATO=true;
    }
  });

  const clarityTag=Q[4].opts[ans[4]].tag;
  const usecaseTag=Q[5].opts[ans[5]].tag;
  const modTag=Q[9].opts[ans[9]].tag;

  let tier,tierClass,rtitle,rdesc;
  if(needsATO){
    tier="Workshop ATO recomendado"; tierClass="tier-purple";

      ?"El cliente está en una etapa exploratoria sin dirección definida. El primer paso es un Workshop ATO de Derevo para identificar casos de uso de alto impacto y definir el roadmap de IA de la organización."
      :"El cliente tiene intención de avanzar con IA pero necesita aterrizar el caso de uso específico. El Workshop ATO es el paso previo ideal para priorizar y definir la propuesta correcta.";
  } else if(usecaseTag==="undefined"){
    tier="Discovery previo recomendado"; tierClass="tier-amber";
    rtitle="Definir el caso de uso antes de presentar propuesta";
    rdesc="El cliente tiene claridad general pero el caso de uso específico aún no está priorizado. Agenda una sesión de discovery técnico-funcional con Derevo antes de cotizar.";
  } else if(pct>=70){
    tier="Candidato calificado"; tierClass="tier-green";
    rtitle="Listo para propuesta formal";
    rdesc="El cliente cumple los criterios clave: caso de uso claro, sponsor ejecutivo y capacidad de inversión. Avanzar con discovery formal (2 semanas) y propuesta comercial.";
  } else if(pct>=50){
    tier="Calificación condicional"; tierClass="tier-amber";
    rtitle="Potencial real con brechas a trabajar";
    rdesc="El cliente muestra interés real y cumple varios criterios, pero hay áreas de riesgo. Revisa las acciones recomendadas y agenda una sesión de discovery antes de presentar propuesta.";
  } else {
    tier="Calificación condicional"; tierClass="tier-amber";
    rtitle="Oportunidad que requiere trabajo previo";
    rdesc="El cliente tiene potencial pero varias brechas por resolver. Las recomendaciones abajo definen el camino a seguir para avanzar hacia una propuesta.";
  }

  let pkg="Por definir en discovery",pkgDetail="",pkgSub="";
  if(modTag==="bronze"){pkg="C-Agent Bronze";pkgDetail="1 especialización · Hasta 2 modelos semánticos · ~6 semanas · Acceso vía Teams";pkgSub="Fondos MS disponibles: hasta $85,000 USD (Azure Accelerate + AFO)";}
  else if(modTag==="silver"){pkg="C-Agent Silver";pkgDetail="2 especializaciones · Hasta 4 modelos semánticos · ~12 semanas · Teams + Web + Voz";pkgSub="Fondos MS disponibles: hasta $85,000 USD (Azure Accelerate + AFO)";}
  else if(modTag==="gold"){pkg="C-Agent Gold";pkgDetail="3 especializaciones · Hasta 8 modelos semánticos · ~24 semanas · Teams + Web + Voz + Avatar";pkgSub="Fondos MS disponibles: hasta $85,000 USD (Azure Accelerate + AFO)";}
  else{pkg="Por definir";pkgDetail="Mapear modelos semánticos en sesión de discovery.";}

  let propuestaHTML=`<hr class="divider"><div class="section-title">Propuesta recomendada</div>
    <div class="pkg-box"><div class="pkg-title">Paquete c-Agent</div><div class="pkg-val">${pkg} — ${pkgDetail}</div>${pkgSub?`<div class="pkg-sub">${pkgSub}</div>`:""}</div>`;

  if(needsDIaaS&&!needsATO){
    propuestaHTML+=`<div class="combo-box"><div class="combo-title">Propuesta combinada recomendada: c-Agent + DIaaS de Derevo</div><div class="combo-body">El cliente necesita preparar sus datos a la par de la implementación de c-Agent. La propuesta incluye un paquete DIaaS (S, M o L) de Derevo para construir los modelos semánticos, ejecutado en paralelo con la configuración de c-Agent. DIaaS incluye Data Engineers y Arquitectos especializados en Fabric, Databricks y Snowflake. Elegible para fondos Azure Accelerate hasta $50,000 USD adicionales para el componente DIaaS.</div></div>`;
  }
  if(needsATO){
    propuestaHTML+=`<div class="ato-box"><div class="ato-title">Siguiente paso: Workshop ATO (AI Transformation Offer) de Derevo</div><div class="ato-body">Sesión estructurada de discovery estratégico para identificar casos de uso de alto valor, priorizar dominios de datos y definir el roadmap de IA de la empresa. Al completar el ATO, el cliente tendrá la claridad necesaria para evaluar una propuesta de c-Agent, DIaaS o una combinación de ambos.</div></div>`;

  const groupOrder=["Perfil","Caso de uso","Decisión","Datos","Técnico","Expectativas","Inversión"];
  let bHTML="";

    const d=groups[g],p=Math.round((d.s/d.m)*100);

  window._contactName=contactName;window._contactEmail=contactEmail;window._contactZona=contactZona;

  const sizeLabel=Q[0].opts[ans[0]].l.split("—")[0].trim();
  const industryLabel=Q[1].opts[ans[1]].l.split("—")[0].trim();
  const sponsorLabel=Q[2].opts[ans[2]].l.split("—")[0].trim();

  const circ=2*Math.PI*42;
  const dash=circ-((pct/100)*circ);
  const rc=needsATO?"#534AB7":pct>=70?"#639922":pct>=50?"#EF9F27":"#E24B4A";

  document.getElementById("quiz-view").style.display="none";
  const rv=document.getElementById("result-view");rv.style.display="block";
  rv.innerHTML=`
    <div style="display:flex;justify-content:center;margin-bottom:1.5rem">
      <svg width="104" height="104" viewBox="0 0 104 104">

          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 52 52)"/>
        <text x="52" y="47" text-anchor="middle" font-size="21" font-weight="600" fill="#1a1a1a">${pct}%</text>
        <text x="52" y="63" text-anchor="middle" font-size="10" fill="#888">score general</text>
      </svg>
    </div>
    <div style="text-align:center;margin-bottom:1.5rem">
      <span class="tier-badge ${tierClass}">${tier}</span>

      <div class="r-desc">${rdesc}</div>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-label">Tamaño / Perfil</div><div class="sum-val">${sizeLabel}</div></div>
      <div class="sum-card"><div class="sum-label">Industria</div><div class="sum-val">${industryLabel}</div></div>
      <div class="sum-card"><div class="sum-label">Sponsor</div><div class="sum-val">${sponsorLabel}</div></div>
    </div>
    ${propuestaHTML}
    <hr class="divider">
    <div class="section-title">Puntaje por dimensión</div>
    ${bHTML}
    ${recsHTML?`<hr class="divider"><div class="section-title">Acciones recomendadas para el partner</div>${recsHTML}`:""}
    <hr class="divider">
    <div class="section-title">Ejecutivo Derevo a contactar</div>
    <div class="contact-box">
      <div class="contact-label">Envia el reporte PDF a este ejecutivo de Derevo para dar seguimiento</div>

      <a class="btn-mailto" href="mailto:${contactEmail}?subject=Reporte%20de%20Calificacion%20c-Agent&body=Hola%20${encodeURIComponent(contactName.split(' ')[0])}%2C%0A%0AAdjunto%20el%20reporte%20de%20calificacion%20de%20cliente%20generado%20con%20el%20cuestionario%20de%20c-Agent.%0A%0APor%20favor%20revisalo%20y%20me%20dices%20como%20seguimos.%0A%0ASaludos">Enviar reporte por correo</a>

    else{doc.setDrawColor(...color);doc.roundedRect(x,iy,w,h,2,2,'S');}

    groups[g].s+=Q[i].opts[ans[i]].sc;
    groups[g].m+=5;
  });
  let total=0,maxT=0;
  Object.values(groups).forEach(d=>{total+=d.s;maxT+=d.m;});
  const pct=Math.round((total/maxT)*100);

  const flags=[];
  let needsDIaaS=false,needsATO=false;
  Q.forEach((q,i)=>{
    const opt=q.opts[ans[i]];
    const key=q.w+'_'+opt.tag;
    if(FLAGS[key]){
      flags.push({...FLAGS[key],key});
      if(['goldlayer_raw','goldlayer_none','goldlayer_tbd'].includes(key)) needsDIaaS=true;
      if(['clarity_exploring','clarity_none'].includes(key)) needsATO=true;
    }
  });
  const sevOrder={purple:0,red:1,amber:2,green:3};
  flags.sort((a,b)=>sevOrder[a.sev]-sevOrder[b.sev]);

  const clarityTag=Q[4].opts[ans[4]].tag;
  const usecaseTag=Q[5].opts[ans[5]].tag;
  const modTag=Q[9].opts[ans[9]].tag;

  let tierLabel,rtitleLabel;

  else if(usecaseTag==='undefined'){tierLabel='Discovery previo recomendado';rtitleLabel='Definir el caso de uso antes de presentar propuesta';}

  else{tierLabel='Calificación condicional';rtitleLabel='Potencial real con brechas a trabajar';}

  let pkgLabel='Por definir en discovery',pkgDetailLabel='';
  if(modTag==='bronze'){pkgLabel='C-Agent Bronze';pkgDetailLabel='1 especialización · Hasta 2 modelos semánticos · ~6 semanas · Teams · Fondos MS hasta $85,000 USD';}
  else if(modTag==='silver'){pkgLabel='C-Agent Silver';pkgDetailLabel='2 especializaciones · Hasta 4 modelos semánticos · ~12 semanas · Teams + Web + Voz · Fondos MS hasta $85,000 USD';}
  else if(modTag==='gold'){pkgLabel='C-Agent Gold';pkgDetailLabel='3 especializaciones · Hasta 8 modelos semánticos · ~24 semanas · Teams + Web + Voz + Avatar · Fondos MS hasta $85,000 USD';}

  const now=new Date();
  const fecha=now.toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});

  // ── HEADER ──────────────────────────────
  doc.setFillColor(...PINK);
  doc.rect(0,0,210,38,'F');
  sf(18,'bold',[255,255,255]); doc.text('Reporte de Calificación c-Agent',ML,16);
  sf(10,'normal',[255,200,230]); doc.text('KIO IT Services × Derevo',ML,23);
  sf(9,'normal',[255,200,230]);
  doc.text('Fecha: '+fecha,ML,30);
  doc.text('Score: '+pct+'%',PW-MR-28,30);
  y=46;

  // ── RESULTADO GENERAL ────────────────────
  checkY(28);
  dRect(ML,y,TW,26,LIGHTGRAY,true);
  sf(7,'bold',GRAY); doc.text('RESULTADO GENERAL',ML+4,y+6);
  sf(13,'bold',DARK); doc.text(sanitize(tierLabel),ML+4,y+15);
  sf(9,'normal',GRAY);
  const rtLines=doc.splitTextToSize(sanitize(rtitleLabel),TW-8);
  doc.text(rtLines,ML+4,y+22);
  y+=32;

  // ── PERFIL DEL CLIENTE ───────────────────
  checkY(22);
  const cards=[
    {label:'TAMANO / PERFIL',val:sanitize(Q[0].opts[ans[0]].l.split('—')[0].trim())},
    {label:'INDUSTRIA',val:sanitize(Q[1].opts[ans[1]].l.split('—')[0].trim())},
    {label:'SPONSOR',val:sanitize(Q[2].opts[ans[2]].l.split('—')[0].trim())}
  ];
  const cw=(TW-8)/3;
  cards.forEach((c,i)=>{
    const cx=ML+i*(cw+4);
    dRect(cx,y,cw,18,LIGHTGRAY,true);
    sf(6,'bold',GRAY); doc.text(c.label,cx+3,y+6);
    sf(8,'normal',DARK);
    const vl=doc.splitTextToSize(c.val,cw-6);
    doc.text(vl[0],cx+3,y+13);
    if(vl[1]) doc.text(vl[1],cx+3,y+17);
  });
  y+=24;

  // ── PROPUESTA RECOMENDADA ────────────────
  checkY(12);
  sf(7,'bold',GRAY); doc.text('PROPUESTA RECOMENDADA',ML,y); y+=5;
  dRect(ML,y,TW,15,LIGHTGRAY,true);
  sf(9,'bold',DARK); doc.text(sanitize(pkgLabel),ML+4,y+7);
  sf(8,'normal',GRAY);
  const pl=doc.splitTextToSize(sanitize(pkgDetailLabel),TW-8);
  doc.text(pl[0]||'',ML+4,y+12);
  y+=19;

  if(needsDIaaS){
    checkY(22);
    dRect(ML,y,TW,20,PURPLE_LIGHT,true);
    sf(8,'bold',PURPLE); doc.text('Propuesta combinada: c-Agent + DIaaS de Derevo',ML+4,y+7);
    sf(8,'normal',[83,74,183]);
    const dl=doc.splitTextToSize(sanitize('Incluir un paquete DIaaS para construir los modelos semanticos en paralelo con c-Agent. Elegible para fondos Azure Accelerate hasta $50,000 USD adicionales para DIaaS.'),TW-8);
    doc.text(dl,ML+4,y+13);
    y+=24;
  }
  if(needsATO){
    checkY(22);
    dRect(ML,y,TW,20,TEAL_LIGHT,true);
    sf(8,'bold',TEAL); doc.text('Siguiente paso: Workshop ATO de Derevo',ML+4,y+7);
    sf(8,'normal',[15,110,86]);
    const al=doc.splitTextToSize(sanitize('Sesion de discovery estrategico para identificar casos de uso de alto valor y definir el roadmap de IA antes de cotizar c-Agent o DIaaS.'),TW-8);
    doc.text(al,ML+4,y+13);
    y+=24;
  }

  // ── PUNTAJE POR DIMENSIÓN ────────────────
  checkY(12);
  sf(7,'bold',GRAY); doc.text('PUNTAJE POR DIMENSIÓN',ML,y); y+=6;
  const groupOrder=['Perfil','Caso de uso','Decisión','Datos','Técnico','Expectativas','Inversión'];
  groupOrder.forEach(g=>{
    if(!groups[g])return;
    checkY(9);
    const d=groups[g],p=Math.round((d.s/d.m)*100);
    sf(9,'normal',DARK); doc.text(g,ML,y);
    doc.setFillColor(...BORDER); doc.roundedRect(ML+50,y-4,95,5,1,1,'F');
    const rgb=hexToRgb(d.color);
    doc.setFillColor(...rgb); doc.roundedRect(ML+50,y-4,Math.max(2,p*0.95),5,1,1,'F');
    sf(8,'normal',GRAY); doc.text(p+'%',ML+148,y);
    y+=8;
  });
  y+=4;

  // ── RESPUESTAS ───────────────────────────
  checkY(12);
  sf(7,'bold',GRAY); doc.text('RESPUESTAS AL CUESTIONARIO',ML,y); y+=6;
  let currentSection='';
  Q.forEach((q,i)=>{
    const sel=q.opts[ans[i]];
    if(q.s!==currentSection){
      currentSection=q.s;
      checkY(12);
      sf(8,'bold',PINK); doc.text(sanitize(currentSection.toUpperCase()),ML,y); y+=3;
      doc.setDrawColor(...BORDER); doc.line(ML,y,ML+TW,y); y+=5;
    }
    sf(8,'bold',DARK);
    const qL=doc.splitTextToSize(sanitize((i+1)+'. '+q.q),TW);
    qL.forEach(l=>{checkY(5);doc.text(l,ML,y);y+=5;});
    sf(9,'normal',[29,158,117]);
    const aL=doc.splitTextToSize(sanitize('>> '+sel.l),TW-4);
    aL.forEach(l=>{checkY(5);doc.text(l,ML+3,y);y+=5;});
    y+=3;
  });

  // ── ACCIONES RECOMENDADAS ────────────────
  if(flags.length>0){
    checkY(12);
    sf(7,'bold',GRAY); doc.text('ACCIONES RECOMENDADAS PARA EL PARTNER',ML,y); y+=6;
    const sevColors={purple:PURPLE,red:[226,75,74],amber:[186,117,23],green:[99,153,34]};
    const sevBg={purple:PURPLE_LIGHT,red:[252,235,235],amber:AMBER_LIGHT,green:[234,243,222]};
    const sevLbl={purple:'ATO/Discovery',red:'Crítico',amber:'Acción requerida',green:'Positivo'};
    flags.forEach(f=>{
      sf(8,'normal',GRAY);
      const aLines=doc.splitTextToSize(sanitize(f.action),TW-10);
      const boxH=12+(aLines.length*4.5)+4;
      checkY(boxH+4);
      dRect(ML,y,TW,boxH,sevBg[f.sev]||LIGHTGRAY,true);
      const bc=sevColors[f.sev]||DARK;
      doc.setFillColor(...bc); doc.roundedRect(ML+3,y+3,24,5,1,1,'F');
      sf(6,'bold',[255,255,255]); doc.text(sevLbl[f.sev]||f.sev,ML+4.5,y+6.8);
      sf(8,'bold',DARK);
      const lbL=doc.splitTextToSize(sanitize(f.label),TW-32);
      doc.text(lbL[0],ML+30,y+6.8);
      sf(8,'normal',GRAY);
      let ay=y+13;
      aLines.forEach(l=>{doc.text(l,ML+5,ay);ay+=4.5;});
      y+=boxH+5;
    });
  }

  // ── PIE DE PÁGINA ────────────────────────
  // Contacto Derevo en PDF
  checkY(28);
  sf(7,'bold',GRAY); doc.text('EJECUTIVO DEREVO A CONTACTAR',ML,y); y+=5;
  dRect(ML,y,TW,22,[238,237,254],true);
  sf(7,'bold',[136,136,136]); doc.text('Envia el reporte PDF a este ejecutivo para dar seguimiento a la oportunidad',ML+4,y+6);
  sf(11,'bold',[60,52,137]); doc.text(sanitize(window._contactName||''),ML+4,y+14);
  sf(9,'normal',[83,74,183]); doc.text(sanitize(window._contactEmail||''),ML+4,y+20);
  sf(8,'normal',[83,74,183]); doc.text('('+sanitize(window._contactZona||'')+')',PW-MR-40,y+14);
  y+=26;

  const totalPages=doc.internal.getNumberOfPages();
  for(let p=1;p<=totalPages;p++){
    doc.setPage(p);
    doc.setFillColor(...BORDER); doc.rect(0,287,210,10,'F');
    sf(7,'normal',GRAY);
    doc.text('c-Agent - KIO IT Services x Derevo  |  Documento confidencial  |  '+sanitize(fecha),ML,293);
    doc.text('Pág. '+p+' / '+totalPages,PW-MR-12,293);
  }

  doc.save('Calificacion-cAgent-'+now.toISOString().slice(0,10)+'.pdf');
}

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}

function sanitize(str){
  return String(str)
    .replace(/—/g,'-').replace(/–/g,'-')
    .replace(/·/g,'.').replace(/×/g,'x')
    .replace(/→/g,'->').replace(/←/g,'<-')
    .replace(/✓/g,'OK').replace(/✗/g,'X')
    .replace(/[^\x00-\x7FáéíóúÁÉÍÓÚüÜñÑ¿¡]/g,'?');
}

function restart(){
  cur=0;ans=new Array(Q.length).fill(null);
  document.getElementById("result-view").style.display="none";
  document.getElementById("quiz-view").style.display="block";
  render();
}

render();
</script>
</body>
</html>
